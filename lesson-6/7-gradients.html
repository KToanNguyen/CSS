<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Gradient Backgrounds</title>
	<style>
		body {
			padding: 1.25em;
			font-size: 100%;
			background: #ccc;
		}

		div {
			float: left;
			height: 150px;
			margin: 10px;
			width: 150px;
			background: silver;
		}

		p {
			color: #fff;
			font: bold 1.25em/1 sans-serif;
			padding-top: 1.65em;
			text-align: center;
		}
		/* STEP 1: LINEAR GRADIENTS
		------------------------------------------ */
		/* Vertical */
		.vertical-down {

			/* default gradient, so you don't need to specify "to bottom" before the colors */
			background: linear-gradient(indigo, violet);
		}
		.vertical-up {
			background: linear-gradient( to top, indigo, violet);
		}
		/* Horizontal */
		.horizontal-rt {
			background: linear-gradient( to right, indigo, violet);
		}
		.horizontal-lt {
			background: linear-gradient( to left, indigo, violet);
		}
		/* Diagonal Angles */
		.angle-corners {
			background: linear-gradient( to bottom right, indigo, violet);
		}
		/* Angles via Degrees */
		.angle-deg {
			background: linear-gradient( 170deg, indigo, violet);
		}

		/* STEP 2: RADIAL GRADIENTS
		------------------------------------------ */
		.radial p {

		}
		.radial-center {
			background-image: radial-gradient(red, rgb(152, 12, 40));
		}
		.radial-top {
			background-image: radial-gradient(at top, red, rgb(152, 12, 40));
		}
		.radial-size-1 {
			background-image: radial-gradient(ellipse at bottom, red, rgb(152, 12, 40));
		}
		.radial-size-2 {
			background-image: radial-gradient(ellipse at top, red, rgb(152, 12, 40));
		}

		/* STEP 3: LINEAR GRADIENTS WITH COLOR STOPS
		------------------------------------------ */
		.color-stops div {
		}
		
		.color-stops p {
		}

		.color-stops {
			background: linear-gradient( to top, coral, orange);
		}
		/* STEP 4: Use a color gradient CSS generator - http://www.colorzilla.com/gradient-editor/ */
		.gradient-generator {

		}
	</style>
</head>
<body>
<div class="vertical-down"><p>default</p></div>
<div class="vertical-up"><p>to top</p></div>

<div class="horizontal-rt"><p>to right</p></div>
<div class="horizontal-lt"><p>to left</p></div>

<div class="angle-corners"><p>corner to corner</p></div>

<div class="angle-deg"><p>degrees</p></div>

<section class="radial">
	<div class="radial-center"><p>default</p></div>
	<div class="radial-top"><p>at top</p></div>

	<div class="radial-size-1"><p>radial size 1</p></div>
	<div class="radial-size-2"><p>radial size 2</p></div>
</section>

<div class="color-stops"><p>color stops</p></div>
<div class="gradient-generator"><p>gradient generator</p></div>
</body>
</html>
